name: AGE Observability Release CI

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0, v1.2.4)

permissions:
  contents: write

jobs:
  release-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Run Conformance Tests
      run: node tools/run-conformance-tests.js

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install MkDocs and Material Theme
      run: |
        pip install mkdocs mkdocs-material

    - name: Build and Deploy Documentation
      run: |
        bash tools/build-docs.sh gh-deploy

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          schemas/age_span_schema.json
          schemas/age_span.proto
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
